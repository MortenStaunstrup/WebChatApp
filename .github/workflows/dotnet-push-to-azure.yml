name: Build and deploy 3 ASP.NET Core apps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: '9.x'
  AZURE_SOCKET_NAME: ChatAppMeSocket
  AZURE_SOCKET_PACKAGE_PATH: "./HubServer/publish"
  SOCKET_PROJECT_PATH: "./HubServer/HubServer.csproj"
  AZURE_API_NAME: ChatAppMeApi
  AZURE_API_PACKAGE_PATH: "./ChatAppAPI/publish"
  API_PROJECT_PATH: "./ChatAppAPI/ChatAppAPI.csproj"
  AZURE_WEBAPP_NAME: ChatAppMe
  AZURE_WEBAPP_PACKAGE_PATH: "./ChatAppWeb/publish"
  WEB_PROJECT_PATH: "./ChatAppWeb/ChatAppWeb.csproj"
  SOLUTION_PATH: "ChatApp.sln"
  PUBLISH_DIR: ./publish

jobs:
  build_and_test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet_version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}
      
      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: Test
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-restore --no-build --verbosity normal

      - name: Publish WebSocket
        run: dotnet publish ${{ env.SOCKET_PROJECT_PATH }} --configuration Release --no-restore --no-build --property:PublishDir=${{ env.PUBLISH_DIR}}
      
      - name: Publish API
        run: dotnet publish ${{ env.API_PROJECT_PATH }} --configuration Release --no-restore --no-build --property:PublishDir=${{ env.PUBLISH_DIR}}
      
      - name: Publish WebApp
        run: dotnet publish ${{ env.WEB_PROJECT_PATH }} --configuration Release --no-restore --no-build --property:PublishDir=${{ env.PUBLISH_DIR}}

      - name: Publish Artifacts for WebSocket
        uses: actions/upload-artifacts@v4
        with:
          name: Web Socket
          path: ${{ env.AZURE_SOCKET_PACKAGE_PATH}}
      
      - name: Publish Artifacts for API
        uses: actions/upload-artifacts@v4
        with:
          name: API
          path: ${{ env.AZURE_API_PACKAGE_PATH}}
      
      - name: Publish Artifacts for WebApp
        uses: actions/upload-artifacts@v4
        with:
          name: Web App
          path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH}}

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [build-and-test]

    steps:
      - name: Download artifact from build job (WebSocket)
        uses: actions/download-artifact@v4
        with:
          name: Web Socket
          path: ${{ env.AZURE_SOCKET_PACKAGE_PATH }}
      
      - name: Deploy Web Socket
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_SOCKET_NAME }}
          publish-profile: ${{ secrets.AZURE_SOCKET_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_SOCKET_PACKAGE_PATH }}
      
      - name: Download artifact from build job (API)
        uses: actions/download-artifact@v4
        with:
          name: API
          path: ${{ env.AZURE_API_PACKAGE_PATH }}
      
      - name: Deploy API
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_API_NAME }}
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_API_PACKAGE_PATH }}
      
      - name: Download artifact from build job (Web App)
        uses: actions/download-artifact@v4
        with:
          name: Web App
          path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
      
      - name: Deploy Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}