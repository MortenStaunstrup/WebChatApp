name: Build and deploy 3 ASP.NET Core apps

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: "9.x"

  AZURE_SOCKET_NAME: ChatAppMeSocket
  SOCKET_PROJECT_PATH: ./HubServer/HubServer.csproj
  SOCKET_PUBLISH_DIR: ${{ github.workspace }}/out/socket

  AZURE_API_NAME: ChatAppMeApi
  API_PROJECT_PATH: ./ChatAppAPI/ChatAppAPI.csproj
  API_PUBLISH_DIR: ${{ github.workspace }}/out/api

  AZURE_WEBAPP_NAME: ChatAppMe
  WEB_PROJECT_PATH: ./ChatAppWeb/ChatAppWeb.csproj
  WEB_PUBLISH_DIR: ${{ github.workspace }}/out/web

  SOLUTION_PATH: ChatApp.sln

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: Test
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-restore --no-build --verbosity normal

      - name: Clean publish folders
        run: |
          rm -rf "${{ env.SOCKET_PUBLISH_DIR }}"
          rm -rf "${{ env.API_PUBLISH_DIR }}"
          rm -rf "${{ env.WEB_PUBLISH_DIR }}"

      - name: Publish WebSocket
        run: dotnet publish ${{ env.SOCKET_PROJECT_PATH }} --configuration Release --no-restore --no-build -o "${{ env.SOCKET_PUBLISH_DIR }}"

      - name: Publish API
        run: dotnet publish ${{ env.API_PROJECT_PATH }} --configuration Release --no-restore --no-build -o "${{ env.API_PUBLISH_DIR }}"

      - name: Publish WebApp
        run: dotnet publish ${{ env.WEB_PROJECT_PATH }} --configuration Release --no-restore -o "${{ env.WEB_PUBLISH_DIR }}"

      - name: Inspect WebApp publish output
        run: |
          echo "=== Published files ==="
          find "${{ env.WEB_PUBLISH_DIR }}" -maxdepth 4 -type f | sort

          echo "=== appsettings files ==="
          for f in $(find "${{ env.WEB_PUBLISH_DIR }}" -iname "appsettings*.json" -type f); do
            echo "---- $f ----"
            ls -l "$f"
            cat "$f"
            echo
          done

      - name: Upload WebSocket artifact
        uses: actions/upload-artifact@v4
        with:
          name: websocket
          path: ${{ env.SOCKET_PUBLISH_DIR }}

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api
          path: ${{ env.API_PUBLISH_DIR }}

      - name: Upload WebApp artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: ${{ env.WEB_PUBLISH_DIR }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Download WebSocket artifact
        uses: actions/download-artifact@v4
        with:
          name: websocket
          path: ${{ env.SOCKET_PUBLISH_DIR }}

      - name: Deploy WebSocket
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_SOCKET_NAME }}
          publish-profile: ${{ secrets.AZURE_SOCKET_PUBLISH_PROFILE }}
          package: ${{ env.SOCKET_PUBLISH_DIR }}

      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api
          path: ${{ env.API_PUBLISH_DIR }}

      - name: Deploy API
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_API_NAME }}
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ${{ env.API_PUBLISH_DIR }}

      - name: Download WebApp artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp
          path: ${{ env.WEB_PUBLISH_DIR }}

      - name: Deploy WebApp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.WEB_PUBLISH_DIR }}