services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: test
      MONGO_INITDB_ROOT_PASSWORD: test123
    ports:
      - "27018:27017"
  
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: azurite
    ports:
      - "10000:10000"
    command: azurite --blobHost 0.0.0.0 --location /data --loose --skipApiVersionCheck
    restart: unless-stopped
  
volumes:
  azurite-data: